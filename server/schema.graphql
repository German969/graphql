# A small blog API: users, posts with authors.

type User {
  id: ID!
  username: String!
  displayName: String!
}

type Post {
  id: ID!
  title: String!
  body: String!
  publishedAt: String!
  author: User
}

type Query {
  blogName: String
  serverTime: String
  posts: [Post!]!
  user(username: String!): User
}

type Mutation {
  createUser(username: String!, displayName: String!): User!
  publishPost(title: String!, body: String!, authorUsername: String!): Post!
}
