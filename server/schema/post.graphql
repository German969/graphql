# Post type and post-related query + mutation.

enum PostOrderBy {
  PUBLISHED_AT_DESC
  PUBLISHED_AT_ASC
  TITLE_ASC
  TITLE_DESC
}

type Post {
  id: ID!
  title: String!
  body: String!
  publishedAt: String!
  author: User
}

# Cursor-based pagination (Relay-style)
type PageInfo {
  hasNextPage: Boolean!
  endCursor: String
}

type PostEdge {
  node: Post!
  cursor: String!
}

type PostConnection {
  edges: [PostEdge!]!
  pageInfo: PageInfo!
}

extend type Query {
  posts(limit: Int, authorUsername: String, orderBy: PostOrderBy): [Post!]!
  post(id: ID!): Post
  """Paginated list of posts. Filter by author, order, use endCursor with after for next page."""
  postsConnection(first: Int = 10, after: String, authorUsername: String, orderBy: PostOrderBy): PostConnection!
}

extend type Mutation {
  publishPost(title: String!, body: String!, authorUsername: String!): Post!
}
